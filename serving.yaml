apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: ollama-llm-template
  annotations:
    scenarios.ai.sap.com/name: "my-custom-llm-scenario"
    executables.ai.sap.com/name: "ollama-llm-executable"
  labels:
    scenarios.ai.sap.com/id: "my-custom-llm-scenario"
    ai.sap.com/version: "1.0.0"
spec:
  inputs:
    parameters:
      - name: image
        type: string
        default: "ollama/ollama:latest"
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        containers:
        - name: kserve-container
          image: "{{inputs.parameters.image}}"
          env:
          - name: HOME
            value: /tmp
          - name: OLLAMA_MODELS
            value: /tmp/.ollama/models
          ports:
          - containerPort: 11434
            protocol: TCP
